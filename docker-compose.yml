services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: proyectorag-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: proyectorag
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  webapi:
    build:
      context: .
      dockerfile: ProyectoRAG.WebApi/Dockerfile
    container_name: proyectorag-webapi
    ports:
      - "5218:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=proyectorag;Username=postgres;Password=postgres"
      VoyageAI__ApiKey: "${VOYAGE_API_KEY}"
      Anthropic__ApiKey: "${ANTHROPIC_API_KEY}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata: